name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Lint, build & unit test
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs for supply-chain safety (comment tracks tag).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Read-only CI; no authenticated git ops needed, so don't persist the token.
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace @timescale-demo/api -- --max-warnings=0

      - name: Build
        run: npm run build --workspace @timescale-demo/api

      - name: Unit tests
        run: npm test --workspace @timescale-demo/api

      - name: Web typecheck
        run: npm run typecheck --workspace @timescale-demo/web

      - name: Web build
        run: npm run build --workspace @timescale-demo/web

  e2e:
    name: End-to-end (TimescaleDB)
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:2.27.2-pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app?schema=public
      # Unused at runtime (only `migrate dev` needs a shadow DB); a valid URL is
      # enough to satisfy env validation.
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shadow?schema=public
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npm run db:deploy

      - name: E2E tests
        run: npm run test:e2e
