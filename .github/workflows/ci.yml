name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Lint, build & unit test
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs for supply-chain safety (comment tracks tag).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Read-only CI; no authenticated git ops needed, so don't persist the token.
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      # End-to-end tests run in a dedicated job (with a TimescaleDB service)
      # once the database is introduced — see the e2e/CI PR in the roadmap.
