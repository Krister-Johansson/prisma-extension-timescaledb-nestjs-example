# All recent anomalies across sensors — for the Anomalies page.
query AllAnomalies($take: Int) {
  anomalies(take: $take) {
    id
    sensorId
    time
    value
    score
    median
    severity
    aiSummary
    acknowledgedAt
  }
}

# Live stream of detected anomalies (and re-published updates, e.g. when the AI
# summary lands). Same fields as the query so they merge cleanly.
subscription AnomalyDetected {
  anomalyDetected {
    id
    sensorId
    time
    value
    score
    median
    severity
    aiSummary
    acknowledgedAt
  }
}

# Dismiss (acknowledged: true, default) or restore (false) a single anomaly.
mutation AcknowledgeAnomaly($id: ID!, $acknowledged: Boolean) {
  acknowledgeAnomaly(id: $id, acknowledged: $acknowledged) {
    __typename
    id
    acknowledgedAt
  }
}

# Dismiss every open anomaly at once; returns how many were cleared.
mutation AcknowledgeAllAnomalies {
  acknowledgeAllAnomalies
}
