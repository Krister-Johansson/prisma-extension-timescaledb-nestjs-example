# Dev-only: wipe all readings + alert events (rejected by the API in production).
mutation PurgeReadings {
  purgeReadings
}

query HypertableStats($model: HypertableModel!) {
  hypertableStats(model: $model) {
    approximateRowCount
    totalBytes
    tableBytes
    indexBytes
    toastBytes
    totalChunks
    compressedChunks
    beforeCompressionBytes
    afterCompressionBytes
  }
}
