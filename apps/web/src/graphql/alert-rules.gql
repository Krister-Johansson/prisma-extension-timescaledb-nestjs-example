# One alert rule per sensor (AlertRule.sensorId is unique). `setAlertRule`
# upserts it; there's no hard delete, so disabling is done via `enabled`.
query SensorAlertRule($sensorId: ID!) {
  alertRule(sensorId: $sensorId) {
    __typename
    id
    sensorId
    direction
    threshold
    clearThreshold
    severity
    enabled
    state
  }
}

mutation SetAlertRule($input: SetAlertRuleInput!) {
  setAlertRule(input: $input) {
    __typename
    id
    sensorId
    direction
    threshold
    clearThreshold
    severity
    enabled
    state
  }
}
