# One alert rule per sensor (AlertRule.sensorId is unique). `setAlertRule`
# upserts it; `deleteAlertRule` removes it.
query SensorAlertRule($sensorId: ID!) {
  alertRule(sensorId: $sensorId) {
    __typename
    id
    sensorId
    direction
    threshold
    clearThreshold
    severity
    enabled
    state
  }
}

mutation SetAlertRule($input: SetAlertRuleInput!) {
  setAlertRule(input: $input) {
    __typename
    id
    sensorId
    direction
    threshold
    clearThreshold
    severity
    enabled
    state
  }
}

mutation DeleteAlertRule($sensorId: ID!) {
  deleteAlertRule(sensorId: $sensorId) {
    __typename
    id
    sensorId
  }
}
