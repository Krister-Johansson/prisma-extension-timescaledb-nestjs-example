# A sensor can have many alert rules. createAlertRule / updateAlertRule(id) /
# deleteAlertRule(id) manage them; alertRules(sensorId) lists them.
query SensorAlertRules($sensorId: ID!) {
  alertRules(sensorId: $sensorId) {
    __typename
    id
    sensorId
    direction
    threshold
    clearThreshold
    severity
    enabled
    state
  }
}

mutation CreateAlertRule($input: CreateAlertRuleInput!) {
  createAlertRule(input: $input) {
    __typename
    id
    sensorId
    direction
    threshold
    clearThreshold
    severity
    enabled
    state
  }
}

mutation UpdateAlertRule($id: ID!, $input: UpdateAlertRuleInput!) {
  updateAlertRule(id: $id, input: $input) {
    __typename
    id
    sensorId
    direction
    threshold
    clearThreshold
    severity
    enabled
    state
  }
}

mutation DeleteAlertRule($id: ID!) {
  deleteAlertRule(id: $id) {
    __typename
    id
    sensorId
  }
}
