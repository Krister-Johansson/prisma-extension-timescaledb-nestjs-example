query SensorAlertEvents($sensorId: ID!, $take: Int) {
  alertEvents(sensorId: $sensorId, take: $take) {
    id
    kind
    value
    message
    createdAt
  }
}

query AllAlertEvents($take: Int) {
  alertEvents(take: $take) {
    id
    sensorId
    kind
    value
    createdAt
  }
}

subscription AlertFired($sensorId: ID) {
  alertFired(sensorId: $sensorId) {
    id
    sensorId
    kind
    value
    message
    createdAt
  }
}
