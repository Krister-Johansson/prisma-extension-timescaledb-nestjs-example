query SensorsList {
  sensors {
    id
    name
    type
    unit
    groupId
    readings {
      time
      value
    }
    rules {
      id
      direction
      threshold
      clearThreshold
      severity
      enabled
      state
    }
  }
}

# Identity only for now — time-series, aggregates and alerts are wired in a
# later PR. Shares the normalized Sensor entity, so edits reflect here live.
query SensorDetail($id: ID!) {
  sensor(id: $id) {
    __typename
    id
    name
    type
    unit
    createdAt
    latestReading {
      time
      value
    }
  }
}

# Returns `readings` so an optimistic create satisfies the SensorsList
# selection (a new sensor has none yet → []). `__typename` is selected so the
# optimisticResponse is fully typed and normalizes into the cache.
mutation CreateSensor($input: CreateSensorInput!) {
  createSensor(input: $input) {
    __typename
    id
    name
    type
    unit
    readings {
      time
      value
    }
    rules {
      id
      direction
      threshold
      clearThreshold
      severity
      enabled
      state
    }
  }
}

# Only the editable scalars — the result merges into the normalized cache
# entry, so existing `readings` are preserved untouched.
mutation UpdateSensor($id: ID!, $input: UpdateSensorInput!) {
  updateSensor(id: $id, input: $input) {
    __typename
    id
    name
    type
    unit
  }
}

mutation DeleteSensor($id: ID!) {
  deleteSensor(id: $id) {
    __typename
    id
  }
}

query SensorReadingsBucketed(
  $sensorId: ID!
  $bucket: String!
  $start: DateTime!
  $end: DateTime!
) {
  sensorReadingsBucketed(
    sensorId: $sensorId
    bucket: $bucket
    start: $start
    end: $end
  ) {
    bucket
    avg
    min
    max
    count
  }
}

query SensorReadingsHourly($start: DateTime, $end: DateTime) {
  sensorReadingsHourly(start: $start, end: $end) {
    sensorId
    bucket
    avgValue
    minValue
    maxValue
    samples
  }
}

mutation RefreshSensorReadingHourly {
  refreshSensorReadingHourly
}

query SensorReadingsBucketedMulti(
  $sensorIds: [ID!]!
  $bucket: String!
  $start: DateTime!
  $end: DateTime!
) {
  sensorReadingsBucketedMulti(
    sensorIds: $sensorIds
    bucket: $bucket
    start: $start
    end: $end
  ) {
    sensorId
    bucket
    avg
    min
    max
    count
  }
}

query SensorGroups {
  sensorGroups {
    id
    name
    parentId
    sensorCount
  }
}

mutation CreateSensorGroup($name: String!, $parentId: ID) {
  createSensorGroup(name: $name, parentId: $parentId) {
    id
    name
    parentId
    sensorCount
  }
}

mutation RenameSensorGroup($id: ID!, $name: String!) {
  renameSensorGroup(id: $id, name: $name) {
    id
    name
    parentId
    sensorCount
  }
}

mutation MoveSensorGroup($id: ID!, $parentId: ID) {
  moveSensorGroup(id: $id, parentId: $parentId) {
    id
    name
    parentId
    sensorCount
  }
}

mutation DeleteSensorGroup($id: ID!) {
  deleteSensorGroup(id: $id)
}

mutation AssignSensorToGroup($sensorId: ID!, $groupId: ID) {
  assignSensorToGroup(sensorId: $sensorId, groupId: $groupId) {
    id
    groupId
  }
}
