# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: true
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - '!**/*.lock'
    - '!**/package-lock.json'
    - '!src/@generated/**'
    - '!prisma/generated/**'
  path_instructions:
    - path: 'src/**/*.ts'
      instructions: >-
        This is a NestJS code-first GraphQL example for the
        prisma-extension-timescaledb package. Prefer NestJS idioms, keep modules
        cohesive, and flag any N+1 GraphQL access that should use a DataLoader.
    - path: 'prisma/schema.prisma'
      instructions: >-
        TimescaleDB hypertables/continuous aggregates are configured via `///`
        annotations consumed by prisma-extension-timescaledb. Do not suggest
        replacing them with plain Prisma constructs.
chat:
  auto_reply: true
